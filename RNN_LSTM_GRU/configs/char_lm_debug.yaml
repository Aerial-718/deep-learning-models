task: char_lm
seeds: [42]

data:
  path: data/raw/tinyshakespeare.txt
  split: [0.9, 0.05, 0.05]

model:
  embedding_size: 32
  hidden_size: 64

training:
  batch_size: 8
  sequence_length: 32
  steps: 100
  learning_rate: 0.002
  gradient_clip: 1.0
  log_interval: 10
  eval_interval: 25
  eval_batches: 5

generation:
  prefix: "ROMEO:"
  new_tokens: 100
  temperature: 0.8
  top_k: 20

